services:
  db:
    image: postgres:16-alpine
    container_name: novoprojeto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-novoprojeto}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-admin}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novoprojeto-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-novoprojeto}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_me_in_production}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novoprojeto-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: novoprojeto-nginx
    restart: unless-stopped
    ports:
      - '9090:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
